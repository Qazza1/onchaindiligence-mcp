name: secret-scan

# Fails the build if a secret (private key, API token, etc.) is ever committed.
# This is the durable, automated version of the manual `git log -G` history
# scan run by hand — it runs on every push and PR so a leaked key is caught
# at the door instead of sitting in history.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # lets you run it manually from the Actions tab

jobs:
  gitleaks:
    name: Scan for committed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 pulls the ENTIRE git history, not just the latest
          # commit. Without this, gitleaks would only scan the newest commit
          # and miss a secret introduced earlier — the whole point is to catch
          # history too.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
